<!DOCTYPE html> 
<html> 
<head> 
<style> 
body { 
  background-color: skyblue; 
  font-family: Arial; 
} 
h1 { 
  text-align: center; 
} 
.nav a { 
  background: darkblue; 
  color: white; 
  padding: 10px; 
  margin: 5px; 
  border-radius: 5px; 
  text-decoration: none; 
} 
.section { 
  background: darkblue; 
  color: white; 
  padding: 15px; 
  margin: 10px; 
} 
</style> 
 
<script> 
function showMessage() { 
  alert("Form Submitted Successfully"); 
} 
</script> 
 
</head> 
<body> 
 
<h1>Student Registration Portal</h1> 
 
<div class="nav"> 
  <a href="#p">Personal</a> 
  <a href="#a">Academic</a> 
  <a href="#ad">Address</a> 
  <a href="#ac">Account</a> 
</div> 
 
<form onsubmit="showMessage()"> 
 
<div id="p" class="section"> 
<h3>Personal Information</h3> 
<input type="text" placeholder="Full Name"><br> 
<input type="date"><br> 
<select><option>Male</option><option>Female</option></select><br> 
<input type="email" placeholder="Email"><br> 
<input type="text" placeholder="Mobile"><br> 
</div> 
 
<div id="a" class="section"> 
<h3>Academic Details</h3> 
<input type="text" placeholder="Register Number"><br> 
<input type="text" placeholder="Degree"><br> 
<input type="text" placeholder="Department"><br> 
<input type="text" placeholder="Year"><br> 
</div> 
 
<div id="ad" class="section"> 
<h3>Address</h3> 
<input type="text" placeholder="Door No"><br> 
<input type="text" placeholder="Street"><br> 
<input type="text" placeholder="City"><br> 
<input type="text" placeholder="State"><br> 
<input type="text" placeholder="Pincode"><br> 
</div> 
 
<div id="ac" class="section"> 
<h3>Account</h3> 
<input type="text" placeholder="Username"><br> 
<input type="password" placeholder="Password"><br> 
<input type="password" placeholder="Confirm Password"><br> 
</div> 
 
<button type="submit">Submit</button> 
 
</form> 
 
</body> 
</html>
