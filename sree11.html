<!DOCTYPE html> 
<html> 
<head> 
<style> 
body { 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  height: 100vh; 
  background-color: lightblue; 
} 
.login-box { 
  background: white; 
  padding: 20px; 
  border: 1px solid gray; 
} 
input, button { 
  display: block; 
  margin: 10px 0; 
  width: 100%; 
} 
</style> 
</head> 
<body> 
 
<div class="login-box"> 
  <h2>Login</h2> 
  <input type="text" placeholder="Username"> 
  <input type="password" placeholder="Password"> 
  <button>Login</button> 
</div> 
 
</body> 
</html>
